<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ana Sayfa - Ani Panosu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-1" aria-hidden="true"></div>
  <div class="bg-shape shape-2" aria-hidden="true"></div>

  <nav class="top-menu" aria-label="Site menusu">
    <button id="menuButton" class="menu-button" type="button" aria-expanded="false" aria-controls="menuDropdown">Menu</button>
    <div id="menuDropdown" class="menu-dropdown" hidden>
      <button id="goHome" type="button">Ana Sayfa</button>
      <a class="menu-link" href="/admin">Admin Panel</a>
    </div>
  </nav>

  <main class="layout">
    <section class="view-screen" aria-label="Ana sayfa">
      <header class="hero">
        <div class="devil-mascot" aria-label="Yesil Seytan Maskotu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="160" height="176" role="img" aria-hidden="true">
            <!-- Boynuzlar -->
            <polygon points="55,60 35,10 75,45" fill="#0f6b36"/>
            <polygon points="145,60 165,10 125,45" fill="#0f6b36"/>
            <!-- Boynuz parlama -->
            <polygon points="55,60 38,18 62,42" fill="#1d8f4a"/>
            <polygon points="145,60 162,18 138,42" fill="#1d8f4a"/>
            <!-- Kafa -->
            <ellipse cx="100" cy="110" rx="70" ry="75" fill="#1d8f4a"/>
            <!-- Kafa golgesi -->
            <ellipse cx="100" cy="130" rx="68" ry="55" fill="#18a352" opacity="0.4"/>
            <!-- Kulaklar -->
            <ellipse cx="32" cy="105" rx="16" ry="22" fill="#1d8f4a"/>
            <ellipse cx="168" cy="105" rx="16" ry="22" fill="#1d8f4a"/>
            <ellipse cx="32" cy="105" rx="9" ry="14" fill="#e05c5c"/>
            <ellipse cx="168" cy="105" rx="9" ry="14" fill="#e05c5c"/>
            <!-- Gozler - beyaz -->
            <ellipse cx="76" cy="100" rx="20" ry="22" fill="white"/>
            <ellipse cx="124" cy="100" rx="20" ry="22" fill="white"/>
            <!-- Goz parlama -->
            <ellipse cx="76" cy="100" rx="20" ry="22" fill="none" stroke="#0a4a24" stroke-width="2"/>
            <ellipse cx="124" cy="100" rx="20" ry="22" fill="none" stroke="#0a4a24" stroke-width="2"/>
            <!-- Pupiller -->
            <ellipse cx="79" cy="102" rx="11" ry="13" fill="#cc1a1a"/>
            <ellipse cx="127" cy="102" rx="11" ry="13" fill="#cc1a1a"/>
            <!-- Iris detay -->
            <ellipse cx="79" cy="102" rx="6" ry="8" fill="#8b0000"/>
            <ellipse cx="127" cy="102" rx="6" ry="8" fill="#8b0000"/>
            <!-- Parca parlama goz -->
            <ellipse cx="73" cy="95" rx="4" ry="3" fill="white" opacity="0.8"/>
            <ellipse cx="121" cy="95" rx="4" ry="3" fill="white" opacity="0.8"/>
            <!-- Kaşlar (kızgın) -->
            <path d="M58,80 Q76,70 94,78" stroke="#0a4a24" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M106,78 Q124,70 142,80" stroke="#0a4a24" stroke-width="5" fill="none" stroke-linecap="round"/>
            <!-- Burun -->
            <ellipse cx="100" cy="122" rx="8" ry="6" fill="#0f6b36"/>
            <circle cx="96" cy="122" r="3" fill="#0a4a24"/>
            <circle cx="104" cy="122" r="3" fill="#0a4a24"/>
            <!-- Agiz (sivri disler) -->
            <path d="M72,145 Q100,165 128,145" stroke="#0a4a24" stroke-width="3" fill="white"/>
            <path d="M72,145 L80,158 L88,145" fill="white" stroke="#0a4a24" stroke-width="1.5"/>
            <path d="M88,145 L96,160 L104,145" fill="white" stroke="#0a4a24" stroke-width="1.5"/>
            <path d="M104,145 L112,158 L120,145" fill="white" stroke="#0a4a24" stroke-width="1.5"/>
            <path d="M120,145 L128,145" stroke="#0a4a24" stroke-width="1.5"/>
            <!-- Alt dis -->
            <path d="M78,158 L85,148 L92,158" fill="#ddd" stroke="#0a4a24" stroke-width="1"/>
            <path d="M100,160 L108,148 L115,160" fill="#ddd" stroke="#0a4a24" stroke-width="1"/>
            <!-- Yanaklar -->
            <ellipse cx="58" cy="130" rx="14" ry="10" fill="#e05c5c" opacity="0.35"/>
            <ellipse cx="142" cy="130" rx="14" ry="10" fill="#e05c5c" opacity="0.35"/>
            <!-- Kuyruk -->
            <path d="M155,180 Q185,160 175,195 Q165,215 148,205" stroke="#0f6b36" stroke-width="8" fill="none" stroke-linecap="round"/>
            <polygon points="148,205 140,218 158,212" fill="#0f6b36"/>
          </svg>
        </div>
        <p class="eyebrow">Yesil Ekip Fedaileri</p>
        <h1>Yesil Ekip Fedaileri</h1>
        <p class="subtitle">
          Sitede sadece fotograflar ve bilgiler gorunur. Ekleme islemi sadece admin panelinden yapilir. peygamber carpsinki lan
        </p>
      </header>

      <section>
        <h2>Kartlarim</h2>
        <div class="filter-bar" aria-label="Kart filtreleri">
          <label>
            <span>Ara</span>
            <input id="searchInput" type="search" placeholder="Baslik veya bilgi ara" />
          </label>
          <label>
            <span>Kategoriye gore</span>
            <select id="filterCategory">
              <option value="all" selected>Tum kategoriler</option>
              <option value="AT HIRSIZI MIRAC">AT HIRSIZI MIRAC</option>
              <option value="PARCALA YILMAZ">PARCALA YILMAZ</option>
              <option value="MASKE UFUK">MASKE UFUK</option>
              <option value="NESINE TURGUT">NESINE TURGUT</option>
            </select>
          </label>
        </div>
        <div id="gallery" class="gallery" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <img class="card-image" alt="Kullanici ekledigi gorsel" loading="lazy" />
      <div class="card-content">
        <p class="card-category"></p>
        <h3 class="card-title"></h3>
        <p class="card-description"></p>
      </div>
    </article>
  </template>

  <script src="script.js?v=20260328-21"></script>
</body>
</html>
