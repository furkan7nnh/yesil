services:
  - type: web
    name: yesil
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    autoDeploy: true
    disks:
      - name: yesil-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
